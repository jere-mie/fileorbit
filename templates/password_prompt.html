{{define "title"}}FileOrbit · Protected File{{end}}
{{define "content"}}
<div class="login-page">
    <div class="login-container">
        <div class="login-brand">
            <div class="orbital-icon">
                <div class="orbit-ring"></div>
                <div class="orbit-ring orbit-ring-2"></div>
                <div class="orbit-core"></div>
            </div>
            <h1 class="brand-title">File<span class="accent">Orbit</span></h1>
            <p class="login-subtitle">PROTECTED FILE</p>
        </div>

        <div class="protected-file-info">
            <span class="file-type-badge">{{fileExt .Filename}}</span>
            <span class="protected-filename">{{.Filename}}</span>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/{{.CustomURL}}" class="login-form">
            <div class="input-group">
                <label for="password">FILE PASSWORD</label>
                <input type="password" id="password" name="password" required autofocus placeholder="Enter file password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">ACCESS FILE →</button>
        </form>
    </div>
</div>
{{end}}
