{{define "title"}}FileOrbit · Login{{end}}
{{define "content"}}
<div class="login-page">
    <div class="login-container">
        <div class="login-brand">
            <div class="orbital-icon">
                <div class="orbit-ring"></div>
                <div class="orbit-ring orbit-ring-2"></div>
                <div class="orbit-core"></div>
            </div>
            <h1 class="brand-title">File<span class="accent">Orbit</span></h1>
            <p class="login-subtitle">FILE MANAGEMENT SYSTEM</p>
        </div>
        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/login" class="login-form">
            <div class="input-group">
                <label for="password">ADMIN PASSWORD</label>
                <input type="password" id="password" name="password" required autofocus placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">AUTHENTICATE →</button>
        </form>
        <p class="login-footer">Secured access · Single admin</p>
    </div>
</div>
{{end}}
